; Smart Car / OBD telemetry — ESP32 firmware
; Board: original ESP32 (WROOM-32). Bluetooth Classic capable for the real ELM327 later.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=2

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
